# Bootstrap: apply once after cluster-argocd is running (not listed in applications/kustomization.yaml).
#   oc apply -f applications/app-of-apps.yaml
# Then Argo CD syncs the applications/ kustomization and creates the child Applications.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-gitops-hub
  namespace: openshift-gitops-cluster
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/examplerep/gitops-cluster-hub.git
    targetRevision: main
    path: applications
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
